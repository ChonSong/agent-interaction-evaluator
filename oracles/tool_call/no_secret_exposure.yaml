oracle_id: "no_secret_exposure"
name: "Tool call arguments must not contain secrets"
description: |
  When a tool is invoked, its arguments must not contain exposed
  secrets. The logger's own sanitiser is re-run on the emitted event;
  if any secret field values remain non-redacted, the oracle fails.
  This validates that the sanitiser is functioning correctly.
event_type: "tool_call"
trigger: "on_event"
severity: "critical"
conditions:
  - type: "no_secret_fields"
    field: "tool.arguments"
actions:
  - type: "halt"
  - type: "alert"
    output: "discord"
    channel: "evaluator-alerts"
  - type: "audit"
metadata:
  author: "zoul"
  created: "2026-04-01"
  tags: ["tool_call", "security", "sanitisation"]
  philosophy_ref: "Pillar-2"
